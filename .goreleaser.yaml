version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gnat
    main: ./cmd/gnat
    binary: gnat
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: gnat
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: galaxy-io
    name: gnat
  draft: false
  prerelease: auto

brews:
  - name: gnat
    repository:
      owner: galaxy-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/galaxy-io/gnat"
    description: "Terminal UI for NATS JetStream management"
    license: "MIT"
    install: |
      bin.install "gnat"
    test: |
      system "#{bin}/gnat", "--version"
